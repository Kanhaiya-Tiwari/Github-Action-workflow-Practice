name: Runner OS Test

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:

  ubuntu-job:
    runs-on: ubuntu-latest
    steps:
      - name: Show system info
        run: |
          echo "OS:"
          uname -a
          echo "Hostname:"
          hostname
          echo "Current User:"
          whoami

  windows-job:
    runs-on: windows-latest
    steps:
      - name: Show system info
        run: |
          echo OS
          hostname
          whoami

  mac-job:
    runs-on: macos-latest
    steps:
      - name: Show system info
        run: |
          echo "OS:"
          uname -a
          echo "Hostname:"
          hostname
          echo "Current User:"
  check-tools:
    runs-on: ubuntu-latest

    steps:
      - name: Check installed tools
        run: |
          docker --version
          python --version
          node --version
          git --version          whoami

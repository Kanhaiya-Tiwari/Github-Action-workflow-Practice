name: Upload Artifact Example

on:
  workflow_dispatch:

jobs:
  create-report:
    runs-on: ubuntu-latest

    steps:
      - name: Generate report
        run: |
          echo "Test Report" > report.txt
          echo "All tests passed" >> report.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: report.txt

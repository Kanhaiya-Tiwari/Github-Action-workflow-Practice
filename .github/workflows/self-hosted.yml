name: Self Hosted Runner Test

on: workflow_dispatch

jobs:
  self-hosted-job:
    runs-on: self-hosted

    steps:
      - name: Show hostname
        run: hostname

      - name: Show working directory
        run: pwd

      - name: Create file
        run: echo "hello from self hosted runner" > testfile.txt

      - name: Verify file
        run: ls

name: Smart Pipeline

on:
  push:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Run lint checks
        run: echo "Running lint checks"

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Run tests
        run: echo "Running tests"  
        
  summary:
    runs-on: ubuntu-latest
    needs: [lint, test]  
    
    steps:
      - name: Print branch type
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            echo "Master branch push"
          else
            echo "Feature branch push"
          fi